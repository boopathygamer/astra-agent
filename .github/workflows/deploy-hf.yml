name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-hf.yml'

jobs:
  deploy-to-hf-spaces:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN secret is missing!"
            exit 1
          fi
          echo "Deploying backend to Space: boopathygamer/astra-agent-backend..."
          python -c '
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ.get("HF_TOKEN"))
          print("Uploading files to boopathygamer/astra-agent-backend space...")
          api.upload_folder(folder_path="./backend", repo_id="boopathygamer/astra-agent-backend", repo_type="space", commit_message="Deploy backend via Actions")
          print("Upload completely successfully!")
          '
