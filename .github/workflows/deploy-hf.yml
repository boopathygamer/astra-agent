name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-hf.yml'

jobs:
  deploy-to-hf-spaces:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN secret is missing!"
            exit 1
          fi
          echo "Deploying backend to Space: boopathygamer/astra-agent-backend..."
          huggingface-cli upload boopathygamer/astra-agent-backend ./backend . --repo-type space --commit-message "Deploy backend to Spaces"
