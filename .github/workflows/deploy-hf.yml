name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-hf.yml'

jobs:
  deploy-to-hf-spaces:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Push to Hugging Face Spaces
        env:
          HF_WRITE_TOKEN: ${{ secrets.HF_WRITE_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME || github.repository_owner }}
        run: |
          if [ -z "$HF_WRITE_TOKEN" ]; then
            echo "Error: HF_WRITE_TOKEN secret is missing!"
            exit 1
          fi
          echo "Deploying backend to Space: $HF_USERNAME/astra-agent-backend..."
          python -c '
          import os
          from huggingface_hub import HfApi
          token = os.environ.get("HF_WRITE_TOKEN")
          username = os.environ.get("HF_USERNAME").strip()
          api = HfApi(token=token)
          repo_id = f"{username}/astra-agent-backend"
          print(f"Ensuring Space {repo_id} exists...")
          try:
              api.create_repo(repo_id=repo_id, repo_type="space", space_sdk="docker", exist_ok=True)
              print("Space verified!")
          except Exception as e:
              print(f"Warning/Error creating space (check if token has WRITE perm): {e}")
          print(f"Uploading files to {repo_id} space...")
          api.upload_folder(folder_path="./backend", repo_id=repo_id, repo_type="space", commit_message="Deploy backend via Actions")
          print("Upload completely successfully!")
          '
