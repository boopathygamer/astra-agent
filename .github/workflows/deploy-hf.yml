name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-hf.yml'

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          echo "Cloning Hugging Face space..."
          git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/astra-agent-backend hf_space
          
          echo "Syncing files..."
          cd hf_space
          # Remove old files but keep .git
          rm -rf *
          # Copy backend files to the root of the Hugging Face repo
          cp -r ../backend/* .
          
          echo "Committing and pushing..."
          git add .
          git commit -m "Auto-sync from GitHub Actions" || echo "No changes to commit"
          git push https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/astra-agent-backend main
