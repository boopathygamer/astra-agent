version: "3.9"

services:
  backend:
    image: ghcr.io/boopathygamer/astra-backend:latest
    container_name: astra-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - astra-data:/app/data
      - astra-reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  astra-data:
  astra-reports:
